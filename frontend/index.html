<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Startup CRM - Operations Hub</title>
    <style>
      html, body, #root {
        background-color: #f8fafc; /* bg-slate-50 fallback */
      }
      html.dark, html.dark body, html.dark #root {
        background-color: #020617; /* dark:bg-slate-950 fallback */
      }
    </style>
    <script>
      const theme =
        localStorage.getItem(
          "startup-crm-theme"
        );

      if (
        theme &&
        JSON.parse(theme)
      ) {
        document.documentElement.classList.add(
          "dark"
        );
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
